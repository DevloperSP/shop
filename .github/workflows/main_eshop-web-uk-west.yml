name: Build and deploy ASP.Net Core app to Azure Web App - eshop-web-uk-west

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x' 

      - name: dotnet restore
        run: dotnet restore src/Web/Web.csproj

      - name: dotnet publish
        # Note the project path change to src/Web/Web.csproj
        run: dotnet publish src/Web/Web.csproj -c Release -r linux-x64 --self-contained true -o ${{env.DOTNET_ROOT}}/web-app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .web-app
          path: ${{env.DOTNET_ROOT}}/web-app

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .web-app
          path: .web-app
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'eshop-web-uk-west'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEST }}
          package: .web-app

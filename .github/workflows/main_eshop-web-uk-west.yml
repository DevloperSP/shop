name: Build and deploy ASP.Net Core app to Azure Web App - eshop-web-uk-south

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x' 

      - name: dotnet restore
        run: dotnet restore src/Web/Web.csproj

      - name: dotnet publish
        # Note the project path change to src/Web/Web.csproj
        run: dotnet publish src/Web/Web.csproj -c Release -r linux-x64 --self-contained true -o ${{env.DOTNET_ROOT}}/web-app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .web-app
          path: ${{env.DOTNET_ROOT}}/web-app

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .web-app
          path: .web-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FC1D53400ACF4A3EADB01CF582B35D63 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0E7CB176BDDC4F8DA2BA5894291E1C82 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E572A6198F7244A1BF792E221A969002 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'eshop-web-uk-west'
          package: .web-app

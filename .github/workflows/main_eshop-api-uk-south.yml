# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - eshop-api-uk-south

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: dotnet restore
        run: dotnet restore src/PublicApi/PublicApi.csproj -f net8.0

      - name: Build with dotnet
        # Keep the -f net8.0 here too
        run: dotnet build src/PublicApi/PublicApi.csproj --configuration Release -f net8.0 --no-restore

      - name: dotnet publish
        # Keep the -f net8.0 here too
        run: dotnet publish src/PublicApi/PublicApi.csproj -c Release -f net8.0 -o ${{env.DOTNET_ROOT}}/myapp --no-restore
        
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FC1D53400ACF4A3EADB01CF582B35D63 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0E7CB176BDDC4F8DA2BA5894291E1C82 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E572A6198F7244A1BF792E221A969002 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'eshop-api-uk-south'
          slot-name: 'Production'
          package: .net-app
          
